<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:'Schibsted Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#0f1a14;}
  input{font-family:inherit;}
</style>
</helmet>

<div style="min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:#fff;">

  <!-- ===================== PANNEAU GAUCHE (marque) ===================== -->
  <div style="background:#07150f;color:#e9f0ea;padding:48px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;">
    <div style="position:absolute;right:-80px;top:-80px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(201,242,78,.16),transparent 70%);"></div>
    <div style="position:absolute;left:-60px;bottom:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(14,159,110,.18),transparent 70%);"></div>
    <a href="Pécule - Landing.dc.html" style="display:flex;align-items:center;gap:11px;text-decoration:none;position:relative;">
      <div style="width:34px;height:34px;border-radius:10px;background:#0e9f6e;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;">P</div>
      <span style="font-size:20px;font-weight:800;letter-spacing:-.02em;color:#fff;">Pécule</span>
    </a>

    <div style="position:relative;">
      <div style="font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#7fd9af;font-weight:700;">Votre vérité financière</div>
      <h1 style="font-size:38px;line-height:1.1;font-weight:800;letter-spacing:-.03em;margin:16px 0 0;color:#fff;text-wrap:balance;">Chaque euro, capté, classé et écrit au grand livre.</h1>
      <div style="display:flex;flex-direction:column;gap:14px;margin-top:30px;">
        <sc-for list="{{ bullets }}" as="b" hint-placeholder-count="3">
          <div style="display:flex;align-items:center;gap:12px;font-size:14.5px;color:#cdd9d1;">
            <span style="width:24px;height:24px;border-radius:7px;background:rgba(201,242,78,.16);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#c9f24e" stroke-width="2.2"><path d="M2.5 7.5 6 11l5.5-7"/></svg></span>{{ b }}
          </div>
        </sc-for>
      </div>
    </div>

    <div style="position:relative;display:flex;align-items:center;gap:10px;font-size:12px;color:#5e7368;">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#7fd9af" stroke-width="1.7"><path d="M8 1.5 13 4v4c0 3-2.2 5.2-5 6.5C5.2 13.2 3 11 3 8V4Z"/><path d="M6 8l1.5 1.5L10.5 6.5"/></svg>
      Agrégation DSP2 chiffrée · agréé ACPR · conforme RGPD
    </div>
  </div>

  <!-- ===================== PANNEAU DROIT (formulaire) ===================== -->
  <div style="display:flex;align-items:center;justify-content:center;padding:48px;">
    <div style="width:100%;max-width:400px;">
      <!-- switch -->
      <div style="display:flex;gap:4px;background:#f4f8f6;border:1px solid #e9efeb;padding:5px;border-radius:13px;margin-bottom:28px;">
        <button onClick="{{ setLogin }}" style="{{ loginTabStyle }}">Connexion</button>
        <button onClick="{{ setSignup }}" style="{{ signupTabStyle }}">Créer un compte</button>
      </div>

      <h2 style="font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0;">{{ heading }}</h2>
      <p style="font-size:14px;color:#93a29a;margin:8px 0 0;">{{ subheading }}</p>

      <!-- OAuth -->
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:24px;">
        <button style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border:1px solid #e3ebe6;background:#fff;border-radius:12px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:#0f1a14;" style-hover="background:#f7faf8;">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.6 9.2c0-.6-.1-1.2-.2-1.8H9v3.5h4.8a4.1 4.1 0 0 1-1.8 2.7v2.2h2.9c1.7-1.6 2.7-3.9 2.7-6.6Z"/><path fill="#34A853" d="M9 18c2.4 0 4.5-.8 6-2.2l-2.9-2.2c-.8.5-1.8.9-3.1.9-2.4 0-4.4-1.6-5.1-3.8H.9v2.3A9 9 0 0 0 9 18Z"/><path fill="#FBBC05" d="M3.9 10.7a5.4 5.4 0 0 1 0-3.4V5H.9a9 9 0 0 0 0 8l3-2.3Z"/><path fill="#EA4335" d="M9 3.6c1.3 0 2.5.5 3.4 1.3l2.6-2.6A9 9 0 0 0 .9 5l3 2.3C4.6 5.2 6.6 3.6 9 3.6Z"/></svg>
          Continuer avec Google
        </button>
      </div>

      <div style="display:flex;align-items:center;gap:12px;margin:22px 0;">
        <div style="flex:1;height:1px;background:#eef3f0;"></div><span style="font-size:12px;color:#a9b5ad;">ou par e-mail</span><div style="flex:1;height:1px;background:#eef3f0;"></div>
      </div>

      <!-- form -->
      <div style="display:flex;flex-direction:column;gap:14px;">
        <sc-if value="{{ isSignup }}" hint-placeholder-val="{{ false }}">
          <div>
            <label style="font-size:12.5px;font-weight:600;color:#59685f;">Nom complet</label>
            <input type="text" placeholder="Camille Moreau" style="width:100%;margin-top:6px;padding:12px 14px;border:1px solid #e3ebe6;border-radius:11px;font-size:14px;outline:none;" />
          </div>
        </sc-if>
        <div>
          <label style="font-size:12.5px;font-weight:600;color:#59685f;">E-mail</label>
          <input type="email" placeholder="camille@exemple.fr" style="width:100%;margin-top:6px;padding:12px 14px;border:1px solid #e3ebe6;border-radius:11px;font-size:14px;outline:none;" />
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;">
            <label style="font-size:12.5px;font-weight:600;color:#59685f;">Mot de passe</label>
            <sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}"><span style="font-size:12px;color:#0e9f6e;font-weight:600;cursor:pointer;">Oublié ?</span></sc-if>
          </div>
          <input type="password" placeholder="••••••••" style="width:100%;margin-top:6px;padding:12px 14px;border:1px solid #e3ebe6;border-radius:11px;font-size:14px;outline:none;" />
        </div>

        <a href="Pécule - Dashboard.dc.html" style="text-decoration:none;text-align:center;width:100%;padding:14px;background:#0e9f6e;color:#fff;border-radius:12px;font-size:15px;font-weight:700;margin-top:4px;">{{ submitLabel }}</a>
      </div>

      <p style="font-size:12px;color:#a9b5ad;line-height:1.5;margin-top:18px;text-align:center;">{{ legalLine }}</p>
      <p style="font-size:13.5px;color:#59685f;margin-top:18px;text-align:center;">{{ switchPrompt }} <span onClick="{{ toggleMode }}" style="color:#0e9f6e;font-weight:700;cursor:pointer;">{{ switchAction }}</span></p>
    </div>
  </div>
</div>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#07150f"/><rect x="30" y="30" width="40" height="40" rx="11" fill="#0e9f6e"/><text x="50" y="64" font-family="sans-serif" font-size="34" font-weight="800" fill="#fff" text-anchor="middle">P</text></svg>
</template>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:720}}">
class Component extends DCLogic {
  state = { mode: 'login' };
  renderVals() {
    const login = this.state.mode === 'login';
    const tab = a => ({ flex: 1, padding: '9px', borderRadius: '9px', border: 'none', cursor: 'pointer', fontFamily: 'inherit', fontSize: '13.5px', fontWeight: '600', background: a ? '#fff' : 'transparent', color: a ? '#0a7a52' : '#59685f', boxShadow: a ? '0 1px 3px rgba(11,40,28,.12)' : 'none', transition: 'all .15s' });
    return {
      bullets: ['Écritures équilibrées, recalculables à tout instant', 'Projections de trésorerie et scénarios', 'Un copilote qui propose, vous qui décidez'],
      isLogin: login, isSignup: !login,
      setLogin: () => this.setState({ mode: 'login' }),
      setSignup: () => this.setState({ mode: 'signup' }),
      toggleMode: () => this.setState(s => ({ mode: s.mode === 'login' ? 'signup' : 'login' })),
      loginTabStyle: tab(login), signupTabStyle: tab(!login),
      heading: login ? 'Bon retour 👋' : 'Créer votre compte',
      subheading: login ? 'Accédez à votre pilotage financier.' : 'Quelques secondes pour démarrer, sans carte.',
      submitLabel: login ? 'Se connecter' : 'Créer mon compte',
      legalLine: login ? 'Connexion sécurisée — vos identifiants ne quittent jamais un canal chiffré.' : 'En créant un compte, vous acceptez les CGU et la Politique de confidentialité.',
      switchPrompt: login ? 'Pas encore de compte ?' : 'Vous avez déjà un compte ?',
      switchAction: login ? 'Créer un compte' : 'Se connecter',
    };
  }
}
</script>
</body>
</html>
